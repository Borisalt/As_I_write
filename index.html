<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Book Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1f2245;
    --navy-mid: #3a4577;
    --sky-mid: #7ea5c0;
    --ice: #d5edf4;
    --ice-soft: #a8cad5;

    --cream: #faf7ee;
    --cream-2: #f3ead9;

    --pink: #f8bfcd;
    --pink-deep: #d88a9e;
    --pink-text: #9a5d72;

    --gold: #c9a65a;
    --gold-light: #e8cd8c;
    --gold-deep: #8c6d2e;

    --ink: #3a2a30;
    --ink-soft: #6b5862;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: transparent;
    font-family: 'Noto Serif KR', 'Cormorant Garamond', Georgia, serif;
    color: var(--ice);
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .stage {
    width: 100%;
    max-width: 520px;
    aspect-ratio: 3 / 4;
    position: relative;
    perspective: 1800px;
  }

  /* ============ CLOSED BOOK ============ */
  .book {
    position: absolute;
    inset: 0;
    cursor: pointer;
    transform-style: preserve-3d;
    transition:
      transform 0.9s cubic-bezier(0.6, 0, 0.3, 1),
      opacity 0.6s ease 0.4s,
      filter 0.4s ease;
  }
  .book:hover { filter: brightness(1.1); }
  .book.opening { transform: scale(1.04) rotateY(-4deg); }
  .book.opened {
    opacity: 0;
    pointer-events: none;
    transform: scale(1.25) rotateY(30deg);
  }

  .cover {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        var(--navy) 0%,
        var(--navy-mid) 35%,
        var(--sky-mid) 72%,
        var(--ice) 100%);
    border-radius: 6px;
    box-shadow:
      0 10px 30px rgba(31, 34, 69, 0.55),
      0 0 50px rgba(213, 237, 244, 0.15),
      inset 0 0 30px rgba(213, 237, 244, 0.1);
    overflow: hidden;
  }

  /* subtle dual frame (no gold corners) */
  .frame {
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(232, 205, 140, 0.6);
    border-radius: 3px;
    pointer-events: none;
  }
  .frame::after {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(213, 237, 244, 0.3);
    border-radius: 2px;
  }

  .stars {
    position: absolute;
    inset: 15px;
    overflow: hidden;
    border-radius: 3px;
    pointer-events: none;
  }
  .star-dot {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.9; }
  }

  /* ========== SUN + MOON SIGIL ========== */
  .sigil-wrap {
    position: absolute;
    top: 48%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 74%;
    aspect-ratio: 1;
    z-index: 2;
  }
  .sigil-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .core-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 42%;
    aspect-ratio: 1;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle,
      rgba(255, 255, 255, 0.85) 0%,
      rgba(232, 245, 250, 0.5) 28%,
      rgba(213, 237, 244, 0.2) 55%,
      transparent 78%);
    filter: blur(4px);
    animation: pulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
    50% { transform: translate(-50%, -50%) scale(1.18); opacity: 1; }
  }

  .click-hint {
    position: absolute;
    bottom: 5.5%;
    left: 0;
    right: 0;
    text-align: center;
    color: var(--gold-deep);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: hint-pulse 2.2s ease-in-out infinite;
    pointer-events: none;
    z-index: 4;
    font-weight: 500;
  }
  @keyframes hint-pulse {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 0.95; }
  }

  /* ============ OPEN STATE (cream) ============ */
  .book-open {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(248, 191, 205, 0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(201, 166, 90, 0.1) 0%, transparent 50%),
      linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);
    border-radius: 6px;
    border: 1.5px solid var(--gold);
    padding: 28px 24px 20px;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.92) rotateY(-8deg);
    transition:
      opacity 0.7s ease 0.4s,
      transform 0.7s cubic-bezier(0.3, 0, 0.2, 1) 0.4s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 10px 20px rgba(31, 34, 69, 0.3),
      0 0 30px rgba(248, 191, 205, 0.2),
      inset 0 0 2px rgba(201, 166, 90, 0.6);
  }
  .book-open.visible {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1) rotateY(0);
  }
  .book-open::before {
    content: '';
    position: absolute;
    inset: 7px;
    border: 1px solid rgba(201, 166, 90, 0.4);
    border-radius: 3px;
    pointer-events: none;
  }

  .close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 26px;
    height: 26px;
    border: 1px solid var(--gold);
    background: var(--cream);
    color: var(--pink-text);
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    z-index: 10;
    transition: all 0.2s;
    font-family: inherit;
  }
  .close-btn:hover {
    background: var(--pink);
    border-color: var(--pink-deep);
    color: white;
    transform: scale(1.12);
  }

  .title {
    text-align: center;
    color: var(--gold-deep);
    font-size: 24px;
    letter-spacing: 3px;
    margin-bottom: 2px;
    font-weight: 700;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
  }
  .subtitle {
    text-align: center;
    color: var(--pink-text);
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.85;
  }
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0 auto 16px;
    width: 70%;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider-diamond {
    width: 6px;
    height: 6px;
    background: var(--pink);
    border: 1px solid var(--gold);
    transform: rotate(45deg);
  }

  .search-form {
    position: relative;
    margin-bottom: 14px;
  }
  .search-input {
    width: 100%;
    padding: 11px 44px 11px 16px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid var(--gold);
    border-radius: 3px;
    color: var(--ink);
    font-size: 14px;
    letter-spacing: 0.2px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
  }
  .search-input:focus {
    border-color: var(--pink-deep);
    box-shadow: 0 0 0 3px rgba(248, 191, 205, 0.35);
    background: white;
  }
  .search-input::placeholder { color: rgba(107, 88, 98, 0.5); }

  .search-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    color: var(--gold-deep);
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
  }
  .search-btn:hover {
    color: var(--pink-deep);
    transform: translateY(-50%) scale(1.25);
  }

  .results {
    flex: 1;
    overflow-y: auto;
    padding-right: 4px;
    position: relative;
    z-index: 1;
  }
  .results::-webkit-scrollbar { width: 4px; }
  .results::-webkit-scrollbar-track { background: rgba(201, 166, 90, 0.12); }
  .results::-webkit-scrollbar-thumb {
    background: var(--gold);
    border-radius: 2px;
  }

  .result-item {
    display: flex;
    gap: 12px;
    padding: 10px;
    margin-bottom: 8px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(201, 166, 90, 0.28);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .result-item:hover {
    background: white;
    border-color: var(--pink-deep);
    transform: translateX(2px);
    box-shadow: 0 2px 12px rgba(248, 191, 205, 0.35);
  }
  .result-cover {
    width: 52px;
    height: 74px;
    flex-shrink: 0;
    background: var(--cream-2);
    border: 1px solid rgba(201, 166, 90, 0.3);
    border-radius: 2px;
    object-fit: cover;
  }
  .result-info { flex: 1; min-width: 0; }
  .result-title {
    color: var(--gold-deep);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-author {
    color: var(--pink-text);
    font-size: 12px;
    margin-bottom: 3px;
  }
  .result-desc {
    color: var(--ink-soft);
    font-size: 11px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    line-height: 1.45;
  }

  .state-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--pink-text);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.65;
  }
  .state-msg.loading::after {
    content: '';
    display: inline-block;
    width: 16px;
    text-align: left;
    animation: dots 1.4s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
</style>
</head>
<body>
<div class="stage">
  <!-- CLOSED BOOK -->
  <div class="book" id="book" role="button" tabindex="0" aria-label="책 열기">
    <div class="cover">
      <div class="frame"></div>
      <div class="stars" id="stars"></div>

      <div class="sigil-wrap">
        <svg class="sigil-svg" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- crescent moon via mask: visible = white, hidden = black -->
            <mask id="moonMask">
              <rect x="-100" y="-100" width="200" height="200" fill="white"/>
              <circle cx="18" cy="-18" r="28" fill="black"/>
            </mask>
            <radialGradient id="petalGrad" cx="50%" cy="100%" r="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
              <stop offset="60%" stop-color="#d5edf4" stop-opacity="0.8"/>
              <stop offset="100%" stop-color="#a8cad5" stop-opacity="0.35"/>
            </radialGradient>
            <radialGradient id="moonGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="100%" stop-color="#e8f5f9"/>
            </radialGradient>
          </defs>

          <!-- subtle outer ring -->
          <circle cx="0" cy="0" r="82"
                  fill="none"
                  stroke="rgba(213, 237, 244, 0.28)"
                  stroke-width="0.5"
                  stroke-dasharray="1.5 3"/>

          <!-- SUN: 12 wavy flame petals, slow rotation -->
          <g>
            <animateTransform
              attributeName="transform"
              type="rotate"
              from="0 0 0"
              to="360 0 0"
              dur="90s"
              repeatCount="indefinite"/>
            <g fill="url(#petalGrad)"
               stroke="rgba(255, 255, 255, 0.5)"
               stroke-width="0.4"
               stroke-linejoin="round">
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(0)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(30)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(60)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(90)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(120)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(150)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(180)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(210)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(240)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(270)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(300)"/>
              <path d="M 0 0 C -7 -22, -3 -52, 0 -76 C 3 -52, 7 -22, 0 0 Z" transform="rotate(330)"/>
            </g>
          </g>

          <!-- thin inner circle -->
          <circle cx="0" cy="0" r="20"
                  fill="none"
                  stroke="rgba(213, 237, 244, 0.55)"
                  stroke-width="0.6"/>

          <!-- CRESCENT MOON, overlapping upper-right -->
          <!-- soft glow behind moon -->
          <circle cx="28" cy="-28" r="34"
                  fill="rgba(255, 255, 255, 0.22)"
                  mask="url(#moonMask)"/>
          <circle cx="28" cy="-28" r="30"
                  fill="url(#moonGrad)"
                  mask="url(#moonMask)"/>
        </svg>

        <div class="core-glow"></div>
      </div>

      <div class="click-hint">CLICK TO OPEN</div>
    </div>
  </div>

  <!-- OPEN STATE -->
  <div class="book-open" id="bookOpen">
    <button class="close-btn" id="closeBtn" aria-label="닫기">×</button>
    <div class="title">GRIMOIRE</div>
    <div class="subtitle">Book of Knowledge</div>
    <div class="divider">
      <div class="divider-diamond"></div>
    </div>
    <div class="search-form">
      <input type="text" class="search-input" id="searchInput"
             placeholder="책 제목, 저자, 키워드..." autocomplete="off" />
      <button class="search-btn" id="searchBtn" aria-label="검색">⌕</button>
    </div>
    <div class="results" id="results">
      <div class="state-msg">찾고 싶은 책을 검색하세요</div>
    </div>
  </div>
</div>

<script>
  /* ============================================================
   * API 키 — 카카오 REST API 키 넣으면 한국책 모드,
   * 비워두면 Google Books 폴백
   * ============================================================ */
  const KAKAO_API_KEY = ''; // 예: 'abcd1234efgh5678...'

  // ===== 별 생성 (위쪽 어두운 영역 위주) =====
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star-dot';
    const size = Math.random() * 2 + 0.5;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    // 상단 0~65% 구간에만 배치 (아래는 밝은 톤이라 안 보임)
    s.style.top = (Math.random() * 65) + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    starsContainer.appendChild(s);
  }

  // ===== 엘리먼트 참조 =====
  const book = document.getElementById('book');
  const bookOpen = document.getElementById('bookOpen');
  const closeBtn = document.getElementById('closeBtn');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const results = document.getElementById('results');

  // ===== 책 열기/닫기 =====
  function openBook() {
    book.classList.add('opening');
    setTimeout(() => {
      book.classList.add('opened');
      bookOpen.classList.add('visible');
      setTimeout(() => searchInput.focus(), 700);
    }, 400);
  }
  function closeBook() {
    bookOpen.classList.remove('visible');
    setTimeout(() => {
      book.classList.remove('opening', 'opened');
    }, 500);
  }
  book.addEventListener('click', openBook);
  book.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openBook(); }
  });
  closeBtn.addEventListener('click', closeBook);

  // ===== 검색 =====
  async function searchBooks(query) {
    const q = query.trim();
    if (!q) return;
    results.innerHTML = '<div class="state-msg loading">SEARCHING</div>';
    try {
      if (KAKAO_API_KEY) {
        renderKakao(await searchKakao(q));
      } else {
        renderGoogle(await searchGoogle(q));
      }
    } catch (e) {
      console.error(e);
      results.innerHTML = '<div class="state-msg">검색 실패</div>';
    }
  }

  async function searchKakao(q) {
    const url = `https://dapi.kakao.com/v3/search/book?query=${encodeURIComponent(q)}&size=20`;
    const res = await fetch(url, {
      headers: { 'Authorization': `KakaoAK ${KAKAO_API_KEY}` }
    });
    if (!res.ok) throw new Error('Kakao ' + res.status);
    const data = await res.json();
    return data.documents || [];
  }
  function renderKakao(items) {
    if (!items.length) {
      results.innerHTML = '<div class="state-msg">결과를 찾을 수 없습니다</div>';
      return;
    }
    results.innerHTML = items.map(v => {
      const cover = v.thumbnail || '';
      const title = v.title || '제목 없음';
      const authors = (v.authors && v.authors.length ? v.authors : ['저자 미상']).join(', ');
      const desc = v.contents || '';
      const link = v.url || '#';
      return `
        <a href="${link}" target="_blank" rel="noopener noreferrer" class="result-item">
          ${cover ? `<img src="${cover}" class="result-cover" alt="" loading="lazy" />` : `<div class="result-cover"></div>`}
          <div class="result-info">
            <div class="result-title">${esc(title)}</div>
            <div class="result-author">${esc(authors)}</div>
            <div class="result-desc">${esc(desc)}</div>
          </div>
        </a>
      `;
    }).join('');
  }

  async function searchGoogle(q) {
    const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=20&printType=books`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Google ' + res.status);
    const data = await res.json();
    return data.items || [];
  }
  function renderGoogle(items) {
    if (!items.length) {
      results.innerHTML = '<div class="state-msg">결과를 찾을 수 없습니다</div>';
      return;
    }
    results.innerHTML = items.map(item => {
      const v = item.volumeInfo || {};
      const coverRaw = v.imageLinks?.thumbnail || v.imageLinks?.smallThumbnail || '';
      const cover = coverRaw.replace(/^http:/, 'https:');
      const title = v.title || '제목 없음';
      const authors = (v.authors || ['저자 미상']).join(', ');
      const desc = v.description || v.subtitle || '';
      const link = v.infoLink || '#';
      return `
        <a href="${link}" target="_blank" rel="noopener noreferrer" class="result-item">
          ${cover ? `<img src="${cover}" class="result-cover" alt="" loading="lazy" />` : `<div class="result-cover"></div>`}
          <div class="result-info">
            <div class="result-title">${esc(title)}</div>
            <div class="result-author">${esc(authors)}</div>
            <div class="result-desc">${esc(desc)}</div>
          </div>
        </a>
      `;
    }).join('');
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  searchBtn.addEventListener('click', () => searchBooks(searchInput.value));
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchBooks(searchInput.value);
  });
</script>
</body>
</html>
