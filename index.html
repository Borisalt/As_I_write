<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Book Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1f2245;
    --navy-mid: #3a4577;
    --sky-mid: #7ea5c0;
    --ice: #d5edf4;
    --ice-soft: #a8cad5;

    --cream: #faf7ee;
    --cream-2: #f3ead9;

    --pink: #f8bfcd;
    --pink-deep: #d88a9e;
    --pink-text: #9a5d72;

    --gold: #c9a65a;
    --gold-light: #e8cd8c;
    --gold-deep: #8c6d2e;

    --ink: #3a2a30;
    --ink-soft: #6b5862;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: transparent; /* 투명 배경 */
    font-family: 'Noto Serif KR', 'Cormorant Garamond', Georgia, serif;
    color: var(--ice);
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .stage {
    width: 100%;
    max-width: 520px;
    aspect-ratio: 3 / 4;
    position: relative;
    perspective: 1800px;
  }

  /* ============ CLOSED BOOK ============ */
  .book {
    position: absolute;
    inset: 0;
    cursor: pointer;
    transform-style: preserve-3d;
    transition:
      transform 0.9s cubic-bezier(0.6, 0, 0.3, 1),
      opacity 0.6s ease 0.4s,
      filter 0.4s ease;
  }
  .book:hover { filter: brightness(1.1); }
  .book.opening { transform: scale(1.04) rotateY(-4deg); }
  .book.opened {
    opacity: 0;
    pointer-events: none;
    transform: scale(1.25) rotateY(30deg);
  }

  .cover {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        var(--navy) 0%,
        var(--navy-mid) 35%,
        var(--sky-mid) 72%,
        var(--ice) 100%);
    border-radius: 6px;
    box-shadow:
      0 10px 15px rgba(31, 34, 69, 0.55),
      0 0 15px rgba(213, 237, 244, 0.15),
      inset 0 0 10px rgba(213, 237, 244, 0.1);
    overflow: hidden;
  }

  .frame {
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(232, 205, 140, 0.6);
    border-radius: 3px;
    pointer-events: none;
  }
  .frame::after {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(213, 237, 244, 0.3);
    border-radius: 2px;
  }

  .stars {
    position: absolute;
    inset: 15px;
    overflow: hidden;
    border-radius: 3px;
    pointer-events: none;
  }
  .star-dot {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.9; }
  }

  /* ========== SUN + MOON SIGIL ========== */
  .sigil-wrap {
    position: absolute;
    top: 48%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 74%;
    aspect-ratio: 1;
    z-index: 2;
  }
  .sigil-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .core-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 42%;
    aspect-ratio: 1;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle,
      rgba(255, 255, 255, 0.85) 0%,
      rgba(232, 245, 250, 0.5) 28%,
      rgba(213, 237, 244, 0.2) 55%,
      transparent 78%);
    filter: blur(4px);
    animation: pulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
    50% { transform: translate(-50%, -50%) scale(1.18); opacity: 1; }
  }

  .click-hint {
    position: absolute;
    bottom: 5.5%;
    left: 0;
    right: 0;
    text-align: center;
    color: var(--gold-deep);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: hint-pulse 2.2s ease-in-out infinite;
    pointer-events: none;
    z-index: 4;
    font-weight: 500;
  }
  @keyframes hint-pulse {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 0.95; }
  }

  /* ============ OPEN STATE (cream) ============ */
  .book-open {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(248, 191, 205, 0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(201, 166, 90, 0.1) 0%, transparent 50%),
      linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);
    border-radius: 6px;
    border: 1.5px solid var(--gold);
    padding: 28px 24px 20px;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.92) rotateY(-8deg);
    transition:
      opacity 0.7s ease 0.4s,
      transform 0.7s cubic-bezier(0.3, 0, 0.2, 1) 0.4s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 10px 15px rgba(31, 34, 69, 0.3),
      0 0 15px rgba(248, 191, 205, 0.2),
      inset 0 0 2px rgba(201, 166, 90, 0.6);
  }
  .book-open.visible {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1) rotateY(0);
  }
  .book-open::before {
    content: '';
    position: absolute;
    inset: 7px;
    border: 1px solid rgba(201, 166, 90, 0.4);
    border-radius: 3px;
    pointer-events: none;
  }

  .close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 26px;
    height: 26px;
    border: 1px solid var(--gold);
    background: var(--cream);
    color: var(--pink-text);
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    z-index: 10;
    transition: all 0.2s;
    font-family: inherit;
  }
  .close-btn:hover {
    background: var(--pink);
    border-color: var(--pink-deep);
    color: white;
    transform: scale(1.12);
  }

  .title {
    text-align: center;
    color: var(--gold-deep);
    font-size: 24px;
    letter-spacing: 3px;
    margin-bottom: 2px;
    font-weight: 700;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
  }
  .subtitle {
    text-align: center;
    color: var(--pink-text);
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.85;
  }
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0 auto 16px;
    width: 70%;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider-diamond {
    width: 6px;
    height: 6px;
    background: var(--pink);
    border: 1px solid var(--gold);
    transform: rotate(45deg);
  }

  .search-form {
    position: relative;
    margin-bottom: 14px;
  }
  .search-input {
    width: 100%;
    padding: 11px 44px 11px 16px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid var(--gold);
    border-radius: 3px;
    color: var(--ink);
    font-size: 14px;
    letter-spacing: 0.2px;
    font-family: inherit;
    outline: none;
    transition: all 0.
